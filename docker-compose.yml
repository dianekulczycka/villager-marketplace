version: "3.9"

services:
  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: villager-marketplace-db
      MYSQL_USER: user
      MYSQL_PASSWORD: user
      MYSQL_ROOT_PASSWORD: rootroot
    ports:
      - "3306:3306"

  backend:
    build: ./backend
    ports:
      - "3003:3003"
    env_file:
      - ./backend/.env
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "80:5173"
    depends_on:
      - backend